apiVersion: apps/v1
kind: Deployment
metadata:
  name: ptcgl-api
  namespace: ptcgl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ptcgl-api
  template:
    metadata:
      labels:
        app: ptcgl-api
    spec:
      containers:
        - name: api
          image: ghcr.io/zwolsman/ptcgl-api:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: api-config
            - secretRef:
                name: api-credentials
          readinessProbe:
            httpGet:
              path: /v1/sets
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
