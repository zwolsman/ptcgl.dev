apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: ptcgl
data:
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ptcgl
  # Public base URL for asset images: {MIRROR_API_ASSET_BASE_URL}/{s3KeyDecoded}/{assetName}.png
  # For Rustfs/Minio with path-style: http://<host>:9000/ptcgl
  # For AWS S3: https://ptcgl.s3.amazonaws.com
  MIRROR_API_ASSET_BASE_URL: https://changeme.example.com/ptcgl
  MIRROR_API_DECODED_S3_PREFIX: "decoded/"
