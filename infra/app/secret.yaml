apiVersion: v1
kind: Secret
metadata:
  name: app-credentials
  namespace: ptcgl-mirror
type: Opaque
stringData:
  # Must match postgres-credentials
  SPRING_DATASOURCE_USERNAME: ptcgl
  SPRING_DATASOURCE_PASSWORD: changeme

  # S3-compatible storage (update endpoint/keys for your homelab)
  MIRROR_S3_ENDPOINT: https://s3.amazonaws.com
  MIRROR_S3_ACCESS_KEY: changeme
  MIRROR_S3_SECRET_KEY: changeme
