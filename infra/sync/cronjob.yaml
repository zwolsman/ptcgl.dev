apiVersion: batch/v1
kind: CronJob
metadata:
  name: ptcgl-sync
  namespace: ptcgl
spec:
  schedule: "0 */6 * * *"   # every 6 hours
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: sync
              image: ghcr.io/zwolsman/ptcgl-sync:latest
              # Default CMD is --sync; override args for one-off operations:
              #   kubectl create job --from=cronjob/ptcgl-sync login -- --login --refresh-token=<token>
              envFrom:
                - configMapRef:
                    name: sync-config
                - secretRef:
                    name: sync-credentials
              resources:
                requests:
                  memory: "512Mi"
                  cpu: "250m"
                limits:
                  memory: "1Gi"
