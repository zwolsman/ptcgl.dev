services:

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ptcgl_mirror
      POSTGRES_USER: ptcgl
      POSTGRES_PASSWORD: ptcgl
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ptcgl -d ptcgl_mirror"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Init container: fix ownership so rustfs (UID 10001) can write to the volume
  rustfs_perms:
    image: alpine
    user: root
    volumes:
      - rustfs_data:/fix_path
    command: chown -R 10001:10001 /fix_path

  rustfs:
    image: rustfs/rustfs:latest
    depends_on:
      rustfs_perms:
        condition: service_completed_successfully
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    environment:
      RUSTFS_VOLUMES: /data/rustfs
      RUSTFS_ROOT_USER: rustfsadmin
      RUSTFS_ROOT_PASSWORD: rustfsadmin
      RUSTFS_CONSOLE_ENABLE: "true"
    volumes:
      - rustfs_data:/data/rustfs

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ptcgl_mirror
      SPRING_DATASOURCE_USERNAME: ptcgl
      SPRING_DATASOURCE_PASSWORD: ptcgl
      MIRROR_API_ASSET_BASE_URL: http://localhost:9090
    depends_on:
      postgres:
        condition: service_healthy

  assets:
    build:
      context: .
      dockerfile: docker/assets.Dockerfile
    ports:
      - "9090:80"
    environment:
      ASSET_S3_UPSTREAM: http://rustfs:9000/ptcgl-mirror
    depends_on:
      - rustfs

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    ports:
      - "3000:80"

volumes:
  postgres_data:
  rustfs_data:
