spring:
  application:
    name: mirror
  autoconfigure:
    exclude:
      - org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration
      - org.springframework.boot.flyway.autoconfigure.FlywayAutoConfiguration

rainier:
  base-url: https://api.studio-prod.pokemon.com
  client-type-access-key: "421d8904-0236-4ab4-94f5-a8a84aeb3f7b"
  client-id: "tpci-tcg-app"
  # PTCS OAuth2 access token (from browser login); used once to mint a studio JWT
  ptcs-token: ${RAINIER_PTCS_TOKEN}
  # Unity game version — used to fetch GameSettings.json which supplies the CDN content path
  app-version: "1.39.0"
  # Platform key used to select the content path from GameSettings.json
  # e.g. osxplayer, windowsplayer, android, iphoneplayer
  platform: osxplayer
