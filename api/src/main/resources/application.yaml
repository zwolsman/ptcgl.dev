spring:
  application:
    name: ptcgl-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ptcgl}
    username: ${SPRING_DATASOURCE_USERNAME:ptcgl}
    password: ${SPRING_DATASOURCE_PASSWORD:ptcgl}
  flyway:
    enabled: false   # schema migrations are run only by the CronJob app
  jackson:
    default-property-inclusion: non_null
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

server:
  port: 8080
  error:
    whitelabel:
      enabled: false

mirror:
  api:
    asset-base-url: ${MIRROR_API_ASSET_BASE_URL:http://localhost:9000/ptcgl-dev}
    decoded-s3-prefix: ${MIRROR_API_DECODED_S3_PREFIX:}
